version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

  jobs:
    pre_install:
      # Install rdkit via conda-forge before pip step
      - conda install -y -c conda-forge rdkit networkx numpy scipy

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - dev
